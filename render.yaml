databases:
  - name: clon-hubspot-db
    plan: basic-256mb
    databaseName: clon_hubspot_production

services:
  - type: web
    name: clon-hubspot
    plan: starter
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clon-hubspot-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_CONNECTED_ACCOUNT_ID
        sync: false
      - key: HTTP_PORT
        value: "10000"
